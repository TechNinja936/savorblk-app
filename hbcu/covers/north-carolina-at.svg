<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001A5E"/>
      <stop offset="60%" style="stop-color:#000D30"/>
      <stop offset="100%" style="stop-color:#001A5E"/>
    </linearGradient>
    <linearGradient id="vgrd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000D30;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000D30;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="goldbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B9A55A;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#B9A55A;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#B9A55A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B9A55A;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements unique per school -->
  
        <polygon points="0,630 300,0 400,0 0,630" fill="#B9A55A" opacity="0.07"/>
        <polygon points="0,630 500,0 650,0 0,630" fill="#B9A55A" opacity="0.04"/>
        <polygon points="1200,0 900,630 750,630 1200,0" fill="#B9A55A" opacity="0.06"/>
        <circle cx="1050" cy="90" r="180" fill="#B9A55A" opacity="0.04"/>
        <circle cx="1050" cy="90" r="130" fill="#B9A55A" opacity="0.04"/>
        <text x="1050" y="230" font-family="Georgia, serif" font-size="340" font-weight="900" 
              fill="#B9A55A" opacity="0.06" text-anchor="middle" dominant-baseline="middle">N</text>
        
  
  <!-- Bottom gradient overlay for text legibility -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#vgrd)" opacity="0.5"/>
  
  <!-- Left accent bar -->
  <rect x="60" y="200" width="4" height="230" fill="#B9A55A" opacity="0.8" rx="2"/>
  
  <!-- HOMECOMING wordmark - small top badge -->
  <rect x="60" y="100" width="220" height="32" rx="4" fill="#B9A55A" opacity="0.15"/>
  <rect x="60" y="100" width="220" height="32" rx="4" fill="none" stroke="#B9A55A" stroke-width="1" opacity="0.4"/>
  <text x="170" y="122" font-family="'Courier New', Courier, monospace" font-size="13" 
        font-weight="700" letter-spacing="5" fill="#B9A55A" opacity="0.9" text-anchor="middle">HOMECOMING</text>
  
  <!-- School short name - large ghost text -->
  
  <!-- Main school name -->
  <text x="76" y="270" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" font-weight="700" 
        fill="#FFFFFF" opacity="0.97" 
        filter="url(#textglow)"
        letter-spacing="-0.5">North Carolina A&T State University</text>
  
  <!-- Gold divider line -->
  <rect x="76" y="295" width="500" height="2" fill="url(#goldbar)" opacity="0.7"/>
  
  <!-- City + State + Year Founded -->
  <text x="76" y="340" 
        font-family="'Courier New', Courier, monospace" 
        font-size="16" letter-spacing="3" 
        fill="#B9A55A" opacity="0.85">GREENSBORO, NC  ·  EST. 1891</text>
  
  <!-- HBCU badge -->
  <rect x="76" y="380" width="94" height="28" rx="3" fill="#B9A55A" opacity="0.2"/>
  <rect x="76" y="380" width="94" height="28" rx="3" fill="none" stroke="#B9A55A" stroke-width="1" opacity="0.5"/>
  <text x="123" y="399" 
        font-family="'Courier New', Courier, monospace" 
        font-size="11" font-weight="700" letter-spacing="3" 
        fill="#B9A55A" text-anchor="middle">HBCU</text>
  
  <!-- SavorBLK attribution bottom-right -->
  <text x="1140" y="610" 
        font-family="'Courier New', Courier, monospace" 
        font-size="11" letter-spacing="2" 
        fill="#B9A55A" opacity="0.35" text-anchor="end">SAVORBLK</text>
  
  <!-- Subtle corner ornament top-right -->
  <line x1="1140" y1="30" x2="1140" y2="80" stroke="#B9A55A" stroke-width="1" opacity="0.3"/>
  <line x1="1090" y1="30" x2="1140" y2="30" stroke="#B9A55A" stroke-width="1" opacity="0.3"/>
  <line x1="1140" y1="600" x2="1140" y2="550" stroke="#B9A55A" stroke-width="1" opacity="0.15"/>
  <line x1="1090" y1="600" x2="1140" y2="600" stroke="#B9A55A" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="600" x2="60" y2="550" stroke="#B9A55A" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="600" x2="110" y2="600" stroke="#B9A55A" stroke-width="1" opacity="0.15"/>

</svg>
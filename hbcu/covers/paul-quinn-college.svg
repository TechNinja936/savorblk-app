<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001A5E"/>
      <stop offset="60%" style="stop-color:#000D30"/>
      <stop offset="100%" style="stop-color:#001A5E"/>
    </linearGradient>
    <linearGradient id="vgrd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#000D30;stop-opacity:0"/>
      <stop offset="100%" style="stop-color:#000D30;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="goldbar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B8860B;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#B8860B;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#B8860B;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements unique per school -->
  
        <path d="M-100,630 Q600,-100 1300,400" stroke="#B8860B" stroke-width="3" fill="none" opacity="0.15"/>
        <path d="M-100,530 Q600,-200 1300,300" stroke="#B8860B" stroke-width="1.5" fill="none" opacity="0.08"/>
        <path d="M-100,730 Q600,0 1300,500" stroke="#B8860B" stroke-width="1" fill="none" opacity="0.06"/>
        <circle cx="80" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="140" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="200" cy="520" r="3" fill="#B8860B" opacity="0.18"/><circle cx="260" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="320" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="380" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="440" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="500" cy="520" r="3" fill="#B8860B" opacity="0.18"/><circle cx="560" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="620" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="680" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="740" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="800" cy="520" r="3" fill="#B8860B" opacity="0.18"/><circle cx="860" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="920" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="980" cy="580" r="3" fill="#B8860B" opacity="0.18"/><circle cx="1040" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="1100" cy="520" r="3" fill="#B8860B" opacity="0.18"/><circle cx="1160" cy="550" r="3" fill="#B8860B" opacity="0.18"/><circle cx="1220" cy="580" r="3" fill="#B8860B" opacity="0.18"/>
        <text x="1100" y="500" font-family="Georgia, serif" font-size="260" font-weight="900" 
              fill="#B8860B" opacity="0.05" text-anchor="middle">PQC</text>
        
  
  <!-- Bottom gradient overlay for text legibility -->
  <rect x="0" y="320" width="1200" height="310" fill="url(#vgrd)" opacity="0.5"/>
  
  <!-- Left accent bar -->
  <rect x="60" y="200" width="4" height="230" fill="#B8860B" opacity="0.8" rx="2"/>
  
  <!-- HOMECOMING wordmark - small top badge -->
  <rect x="60" y="100" width="220" height="32" rx="4" fill="#B8860B" opacity="0.15"/>
  <rect x="60" y="100" width="220" height="32" rx="4" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.4"/>
  <text x="170" y="122" font-family="'Courier New', Courier, monospace" font-size="13" 
        font-weight="700" letter-spacing="5" fill="#B8860B" opacity="0.9" text-anchor="middle">HOMECOMING</text>
  
  <!-- School short name - large ghost text -->
  
  <!-- Main school name -->
  <text x="76" y="290" 
        font-family="Georgia, 'Times New Roman', serif" 
        font-size="52" font-weight="700" 
        fill="#FFFFFF" opacity="0.97" 
        filter="url(#textglow)"
        letter-spacing="-0.5">Paul Quinn College</text>
  
  <!-- Gold divider line -->
  <rect x="76" y="310" width="500" height="2" fill="url(#goldbar)" opacity="0.7"/>
  
  <!-- City + State + Year Founded -->
  <text x="76" y="350" 
        font-family="'Courier New', Courier, monospace" 
        font-size="16" letter-spacing="3" 
        fill="#B8860B" opacity="0.85">DALLAS, TX  ·  EST. 1872</text>
  
  <!-- HBCU badge -->
  <rect x="76" y="390" width="94" height="28" rx="3" fill="#B8860B" opacity="0.2"/>
  <rect x="76" y="390" width="94" height="28" rx="3" fill="none" stroke="#B8860B" stroke-width="1" opacity="0.5"/>
  <text x="123" y="409" 
        font-family="'Courier New', Courier, monospace" 
        font-size="11" font-weight="700" letter-spacing="3" 
        fill="#B8860B" text-anchor="middle">HBCU</text>
  
  <!-- SavorBLK attribution bottom-right -->
  <text x="1140" y="610" 
        font-family="'Courier New', Courier, monospace" 
        font-size="11" letter-spacing="2" 
        fill="#B8860B" opacity="0.35" text-anchor="end">SAVORBLK</text>
  
  <!-- Subtle corner ornament top-right -->
  <line x1="1140" y1="30" x2="1140" y2="80" stroke="#B8860B" stroke-width="1" opacity="0.3"/>
  <line x1="1090" y1="30" x2="1140" y2="30" stroke="#B8860B" stroke-width="1" opacity="0.3"/>
  <line x1="1140" y1="600" x2="1140" y2="550" stroke="#B8860B" stroke-width="1" opacity="0.15"/>
  <line x1="1090" y1="600" x2="1140" y2="600" stroke="#B8860B" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="600" x2="60" y2="550" stroke="#B8860B" stroke-width="1" opacity="0.15"/>
  <line x1="60" y1="600" x2="110" y2="600" stroke="#B8860B" stroke-width="1" opacity="0.15"/>

</svg>